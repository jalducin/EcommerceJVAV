AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  MetalShop - plataforma ecommerce serverless (Sprint 0): Lambda (FastAPI/Mangum) +
  API Gateway (HTTP API con throttling de login) + DynamoDB single-table +
  S3/CloudFront (frontend) + SES (email). IAM de mínimo privilegio.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  SecretKey:
    Type: String
    NoEcho: true
    Description: Clave JWT HS256.
    Default: cambia-esta-clave-en-deploy
  FrontendUrl:
    Type: String
    Default: "*"
    Description: Origen permitido para CORS (en prod, el dominio de CloudFront).
  DocsPassword:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Contraseña para la documentación OpenAPI (Basic auth, usuario 'jvmarket').
      Vacío = docs deshabilitados (404).

Globals:
  Function:
    Runtime: python3.11
    Timeout: 15
    MemorySize: 512
    Environment:
      Variables:
        # AWS_REGION es reservada por Lambda (se inyecta sola); no se declara aquí.
        DYNAMODB_TABLE: !Ref Table
        SECRET_KEY: !Ref SecretKey
        ENVIRONMENT: !Ref Environment
        FRONTEND_URL: !Ref FrontendUrl
        DOCS_PASSWORD: !Ref DocsPassword

Resources:
  # ─────────────────────────── API: Lambda + HTTP API ───────────────────────
  Api:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "metalshop-api-${Environment}"
      CodeUri: .
      Handler: backend.app.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref Table
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY
        # Ruta explícita para poder aplicarle throttling específico (ver RouteSettings).
        Login:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/auth/login
            Method: POST

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendUrl
        AllowMethods: ["*"]
        AllowHeaders: ["*"]
      # Regla repo->AWS aparte; aquí: throttling de login a nivel de API Gateway.
      DefaultRouteSettings:
        ThrottlingBurstLimit: 200
        ThrottlingRateLimit: 100
      RouteSettings:
        "POST /api/auth/login":
          ThrottlingBurstLimit: 5
          ThrottlingRateLimit: 2

  # ─────────────────────────── Datos: DynamoDB single-table ─────────────────
  Table:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "metalshop-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
        - { AttributeName: GSI1PK, AttributeType: S }
        - { AttributeName: GSI1SK, AttributeType: S }
        - { AttributeName: GSI2PK, AttributeType: S }
        - { AttributeName: GSI2SK, AttributeType: S }
        - { AttributeName: GSI3PK, AttributeType: S }
        - { AttributeName: GSI3SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: GSI1PK, KeyType: HASH }
            - { AttributeName: GSI1SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: GSI2
          KeySchema:
            - { AttributeName: GSI2PK, KeyType: HASH }
            - { AttributeName: GSI2SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: GSI3
          KeySchema:
            - { AttributeName: GSI3PK, KeyType: HASH }
            - { AttributeName: GSI3SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  # ─────────────────────────── Frontend: S3 + CloudFront ────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "metalshop-frontend-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "metalshop-oac-${Environment}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOac
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          # CachingOptimized (id administrado por AWS)
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        PriceClass: PriceClass_100

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

Outputs:
  ApiUrl:
    Description: URL base de la API (API Gateway HTTP API).
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
  FrontendUrl:
    Description: URL del frontend (CloudFront).
    Value: !Sub "https://${FrontendDistribution.DomainName}"
  TableName:
    Description: Nombre de la tabla DynamoDB.
    Value: !Ref Table
