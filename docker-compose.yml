# Desarrollo local: DynamoDB Local para correr/probar el backend serverless sin AWS.
# Uso:
#   docker compose up -d
#   # en .env: DYNAMODB_ENDPOINT_URL=http://localhost:8000
#   poetry run python seed_dynamodb.py
#   poetry run uvicorn backend.app:app --reload
services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: metalshop-dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -inMemory -sharedDb"
