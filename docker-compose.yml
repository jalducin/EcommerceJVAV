version: "3.9"

services:
  app:
    build:
      context: .
      target: development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://metalshop:metalshop@db:5432/metalshop
      ENVIRONMENT: development
      SECRET_KEY: dev-secret-key-change-in-production-32chars
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: metalshop
      POSTGRES_PASSWORD: metalshop
      POSTGRES_DB: metalshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metalshop -d metalshop"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
